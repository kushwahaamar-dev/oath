<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Oath — demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,600;6..96,700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: Manrope, Inter, system-ui, sans-serif; }
  #root { position: fixed; inset: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>
<script type="text/babel" src="demo-scenes.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const DURATION = 62;
  const S = {
    hero:      [0.0,  6.0],
    compose:   [6.0,  12.5],
    planning:  [12.5, 15.5],
    proposal:  [15.5, 24.0],
    signing:   [24.0, 26.0],
    proposal2: [24.0, 27.0],  // keeps proposal visible behind phantom
    timeline:  [27.0, 35.5],
    attack:    [35.5, 43.0],
    dossier:   [43.0, 51.0],
    dashboard: [51.0, 58.0],
    final:     [58.0, 62.0],
  };

  function App() {
    return (
      <Stage width={1920} height={1080} duration={DURATION} background={BG} persistKey="oath-demo-real">
        <Vignette />
        <SiteHeader />
        <Sprite start={S.hero[0]}      end={S.hero[1]}><SceneHero /></Sprite>
        <Sprite start={S.compose[0]}   end={S.compose[1]}><SceneChatCompose /></Sprite>
        <Sprite start={S.planning[0]}  end={S.planning[1]}><ScenePlanning /></Sprite>
        <Sprite start={S.proposal[0]}  end={S.proposal2[1]}><SceneProposal signing={false} /></Sprite>
        <Sprite start={S.signing[0]}   end={S.signing[1]}><ScenePhantomSign /></Sprite>
        <Sprite start={S.timeline[0]}  end={S.timeline[1]}><SceneActionTimeline attack={false} /></Sprite>
        <Sprite start={S.attack[0]}    end={S.attack[1]}><SceneActionTimeline attack={true} /></Sprite>
        <Sprite start={S.dossier[0]}   end={S.dossier[1]}><SceneOathDossier /></Sprite>
        <Sprite start={S.dashboard[0]} end={S.dashboard[1]}><SceneDashboard /></Sprite>
        <Sprite start={S.final[0]}     end={S.final[1]}><SceneFinalChamber /></Sprite>
      </Stage>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
